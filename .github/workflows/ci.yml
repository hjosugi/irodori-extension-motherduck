name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      CARGO_BUILD_JOBS: "2"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: DUCKDB_DOWNLOAD_LIB=1 cargo clippy --all-targets --no-default-features -- -D warnings
      - run: DUCKDB_DOWNLOAD_LIB=1 cargo test --no-default-features
